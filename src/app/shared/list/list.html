@if (dataSource()) {
  <div class="table-card">
    <table mat-table [dataSource]="dataSource()!" class="modern-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element" class="text-muted">#{{ element.id }}</td>
      </ng-container>

      <ng-container matColumnDef="employee">
        <th mat-header-cell *matHeaderCellDef>Employee</th>
        <td mat-cell *matCellDef="let element">
          <div class="employee-cell">
            <span class="employee-name">{{ element.employeeName }}</span>
            <span class="absence-type text-muted">{{ element.type }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="dates">
        <th mat-header-cell *matHeaderCellDef>Dates</th>
        <td mat-cell *matCellDef="let element">
          <div class="date-cell">
            <mat-icon class="date-icon">calendar_today</mat-icon>
            <span
              >{{ element.startDate | date: 'mediumDate' }} -
              {{ element.endDate | date: 'mediumDate' }}</span
            >
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">
          <span class="status-pill">
            {{ element.status }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element" class="action-cell">
          <button
            mat-icon-button
            class="action-btn"
            [routerLink]="['/dashboard/absences/detail', element.id]"
          >
            <mat-icon>chevron_right</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" class="modern-row"></tr>
    </table>
    <mat-paginator
      [length]="totalElements()"
      [pageSizeOptions]="[5, 10, 25]"
      [pageSize]="pageLimit()"
      [pageIndex]="pageIndex()"
      (page)="handlePageEvent($event)"
    ></mat-paginator>
  </div>
}
