@if (dataSource()) {
  <div class="table-card">
    <table mat-table [dataSource]="dataSource()!" class="modern-table">
      <ng-container matColumnDef="taxId">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element" class="text-muted">#{{ element.taxId }}</td>
      </ng-container>

      <ng-container matColumnDef="employee">
        <th mat-header-cell *matHeaderCellDef>Employee</th>
        <td mat-cell *matCellDef="let element">
          <div class="employee-cell">
            <span class="employee-name">{{ element.firstName }} {{ element.lastName }}</span>
            <span class="absence-type text-muted">{{ element.status }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="jobTitle">
        <th mat-header-cell *matHeaderCellDef>Job Title</th>
        <td mat-cell *matCellDef="let element">
          <div class="employee-cell">
            <span class="employee-name">{{ element.jobTitle }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let element">
          <span class="text-muted">
            {{ element.phone }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="NSS">
        <th mat-header-cell *matHeaderCellDef>NSS</th>
        <td mat-cell *matCellDef="let element">
          <span class="text-muted">
            {{ element.NSS }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element" class="action-cell">
          <button mat-icon-button class="action-btn" [routerLink]="['/dashboard/employees']">
            <mat-icon>chevron_right</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns" class="modern-row"></tr>
    </table>
    <mat-paginator
      [length]="totalElements()"
      [pageSizeOptions]="[5, 10, 15]"
      [pageSize]="pageLimit()"
      [pageIndex]="pageIndex()"
      (page)="handlePageEvent($event)"
    ></mat-paginator>
  </div>
}
